services:
  senf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: senf-app
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_PATH: /app/data/senf.db
      DATA_PROTECTION_KEYS_PATH: /app/data/DataProtection-Keys
      PORT: ${PORT:-5000}
    volumes:
      - senf-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${PORT:-5000}/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  senf-data:
    driver: local
