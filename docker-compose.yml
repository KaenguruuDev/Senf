version: '3.8'

services:
  senf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: senf-app
    ports:
      # Format: "host_port:container_port"
      # Default: 5000 (can be changed by updating PORT env var and this mapping)
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DATABASE_PATH=/app/data/senf.db
      # Configure the port the app listens on (inside container)
      # Change this to use a different port
      - PORT=5000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/openapi/v1.json"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  senf-data:
    driver: local
